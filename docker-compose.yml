version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: beaver-ai-mysql
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: beaver2026
      MYSQL_DATABASE: beaver_ai
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - beaver-ai-mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beaver-ai-redis
    ports:
      - "16379:6379"
    volumes:
      - beaver-ai-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  beaver-ai-mysql-data:
  beaver-ai-redis-data:
